name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: team_finder
          POSTGRES_USER: team_finder
          POSTGRES_PASSWORD: team_finder
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-secret-key-for-testing-only
      DJANGO_DEBUG: "True"
      POSTGRES_DB: team_finder
      POSTGRES_USER: team_finder
      POSTGRES_PASSWORD: team_finder
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      TASK_VERSION: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Run flake8 (PEP 8)
        run: flake8 users/ projects/ team_finder/ manage.py --max-line-length=100 --exclude=__pycache__

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U team_finder; do
            echo "Waiting for postgres..."
            sleep 1
          done

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Create test data
        run: python manage.py create_test_data

      - name: Run tests
        run: python manage.py test --verbosity=2